<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOCK. POP. GROOVE. — 街舞技巧档案</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0a0a'/%3E%3Ccircle cx='16' cy='7' r='3' fill='%23f5e642'/%3E%3Cline x1='16' y1='10' x2='16' y2='20' stroke='%23f5e642' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='16' y1='13' x2='22' y2='10' stroke='%23f5e642' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='16' y1='13' x2='9' y2='16' stroke='%23f5e642' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='16' y1='20' x2='12' y2='28' stroke='%23f5e642' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='16' y1='20' x2='22' y2='26' stroke='%23f5e642' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2 class="login-title">GROOVE档案</h2>
      <p class="login-subtitle">管理员登录</p>
      <input type="password" id="loginPassword" class="login-input" placeholder="输入密码" autocomplete="off">
      <button class="login-btn" id="loginBtn">登录</button>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- Top Navigation -->
  <nav class="top-nav" id="topNav">
    <div class="nav-inner">
      <a href="#hero" class="nav-logo">GROOVE档案</a>
      <div class="nav-links">
        <a href="#styles" data-style="locking">Locking</a>
        <a href="#styles" data-style="popping">Popping</a>
        <a href="#styles" data-style="hiphop">Hip-Hop</a>
      </div>
      <div class="nav-actions">
        <label class="compact-toggle" title="极简模式">
          <input type="checkbox" id="compactMode">
          <span class="compact-toggle-label">极简</span>
        </label>
        <button class="nav-add-btn" id="addMoveBtn" title="添加动作">+</button>
        <button class="nav-api-btn" id="apiKeyBtn" title="API Key 管理">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.78 7.78 5.5 5.5 0 0 1 7.78-7.78zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      </button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <h1 class="hero-title">LOCK. POP. GROOVE.</h1>
      <p class="hero-subtitle">个人街舞技巧档案</p>
      <div class="hero-buttons">
        <button class="hero-btn" data-style="locking">LOCKING</button>
        <button class="hero-btn" data-style="popping">POPPING</button>
        <button class="hero-btn" data-style="hiphop">HIP-HOP</button>
      </div>
    </div>
  </section>

  <!-- Styles Section -->
  <section class="styles-section" id="styles">
    <div class="tabs">
      <button class="tab active" data-style="locking">Locking</button>
      <button class="tab" data-style="popping">Popping</button>
      <button class="tab" data-style="hiphop">Hip-Hop</button>
    </div>
    <div class="search-bar">
      <input type="text" id="moveSearch" placeholder="搜索动作..." autocomplete="off">
    </div>
    <div class="cards-container" id="cardsContainer"></div>
  </section>

  <footer class="footer">
    <p>LOCK. POP. GROOVE. &copy; 2026 — Keep dancing.</p>
  </footer>

  <!-- Edit Move Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">编辑动作</h2>
        <button class="modal-close" id="editModalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="config-form">
          <label>动作名称<input type="text" id="editName" autocomplete="off"></label>
          <div class="field-with-ai">
            <label>描述<textarea id="editDesc" rows="3"></textarea></label>
            <button class="ai-field-btn" data-field="desc" title="AI 生成描述">AI</button>
          </div>
          <div class="field-with-ai">
            <label>练习建议（每行一条）<textarea id="editTips" rows="4"></textarea></label>
            <button class="ai-field-btn" data-field="tips" title="AI 生成建议">AI</button>
          </div>
          <div class="field-with-ai">
            <label>SVG 图示
              <div class="svg-edit-area">
                <textarea id="editSvg" rows="6" class="svg-code"></textarea>
                <div class="svg-preview" id="editSvgPreview"></div>
              </div>
            </label>
            <button class="ai-field-btn" data-field="svg" title="AI 生成 SVG">AI</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" id="editSaveBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- Add Move Modal -->
  <div class="modal-overlay" id="addMoveModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">添加动作</h2>
        <button class="modal-close" id="addMoveModalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="config-form">
          <label>动作英文名（每行一个，多行则批量导入）<textarea id="moveNameInput" rows="3" placeholder="如：Kick Ball Change&#10;Wrist Roll&#10;Skeeter Rabbit" autocomplete="off"></textarea></label>
          <label>舞种
            <select id="moveStyleSelect">
              <option value="locking">Locking</option>
              <option value="popping">Popping</option>
              <option value="hiphop">Hip-Hop</option>
            </select>
          </label>
        </div>
        <div class="modal-footer" id="generateActions">
          <button class="modal-btn" id="generateBtn">生成</button>
        </div>
        <div class="generate-loading" id="generateLoading" style="display:none">
          <div class="spinner"></div>
          <span>AI 生成中...</span>
        </div>
        <div class="preview-area" id="previewArea" style="display:none">
          <h3 class="preview-title">预览</h3>
          <div class="preview-card" id="previewCard"></div>
          <div class="modal-footer">
            <button class="modal-btn modal-btn-secondary" id="regenerateBtn">重新生成</button>
            <button class="modal-btn" id="confirmAddBtn">确认添加</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- API Key Modal -->
  <div class="modal-overlay" id="apiModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">API Key 管理</h2>
        <button class="modal-close" id="apiModalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="config-selector">
          <select id="configSelect"></select>
          <button class="config-btn" id="configAdd" title="新增方案">+</button>
          <button class="config-btn config-btn-danger" id="configDelete" title="删除方案">&minus;</button>
        </div>
        <div class="config-form">
          <label>方案名称<input type="text" id="cfgName" placeholder="如：GLM 免费"></label>
          <label>API 地址<input type="text" id="cfgUrl" placeholder="https://api.openai.com/v1"></label>
          <label>API Key<input type="password" id="cfgKey" placeholder="sk-..."></label>
          <label>API 格式
            <select id="cfgFormat">
              <option value="openai">OpenAI 兼容</option>
              <option value="anthropic">Anthropic</option>
            </select>
          </label>
          <label>模型名称<input type="text" id="cfgModel" placeholder="gpt-4o / claude-sonnet-4-6"></label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" id="configExport">导出</button>
        <button class="modal-btn" id="configImport">导入</button>
        <button class="modal-btn" id="configSave">保存</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
